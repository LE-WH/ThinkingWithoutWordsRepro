compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  # NOTE: relative to where you invoke `accelerate launch`. Run from the repo root.
  deepspeed_config_file: configs/ds_zero3.json
  zero3_init_flag: true
distributed_type: DEEPSPEED
machine_rank: 0
main_training_function: main
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
